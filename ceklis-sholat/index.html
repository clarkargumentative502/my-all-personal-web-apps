<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🕌 Ceklis Sholat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-theme">

    <!-- Header -->
    <header class="header">
        <div>
            <h1 class="header-title">Ceklis Sholat</h1>
            <p id="current-date" class="header-date"></p>
        </div>
        <button onclick="toggleDarkMode()" class="theme-toggle" aria-label="Toggle dark mode">
            <svg id="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <!-- Moon icon (default) -->
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>
    </header>

    <main class="main-content">
        
        <!-- Progress Card -->
        <div class="progress-card">
            <div class="progress-ring-container">
                <svg class="progress-svg" width="96" height="96">
                    <circle class="progress-ring-bg" stroke-width="8" fill="transparent" r="40" cx="48" cy="48" />
                    <circle id="progress-bar" class="progress-ring-fill" stroke-width="8" stroke-dasharray="251.2" stroke-dashoffset="251.2" stroke-linecap="round" fill="transparent" r="40" cx="48" cy="48" />
                </svg>
                <div class="progress-text">
                    <span id="percent-text" class="progress-percent">0%</span>
                </div>
            </div>
            <div>
                <h2 class="progress-title">Progres Hari Ini</h2>
                <p id="progress-status" class="progress-subtitle">Semangat istiqomah!</p>
            </div>
        </div>

        <!-- Prayer List -->
        <div id="prayer-list" class="prayer-list">
            <!-- Items injected via JS -->
        </div>

        <!-- Info / Quote Box -->
        <div class="quote-box">
            <p class="quote-text">
                "Sesungguhnya sholat itu mencegah dari perbuatan keji dan mungkar." (QS. Al-Ankabut: 45)
            </p>
        </div>

        <!-- Reset Button -->
        <button onclick="resetData()" class="reset-button">
            Reset Semua Data
        </button>

    </main>

    <!-- Navigation Bar -->
    <nav class="bottom-nav">
        <button class="nav-item active">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
                <polyline points="10 14 12 16 14 14"></polyline>
            </svg>
            <span class="nav-label">Hari Ini</span>
        </button>
        <button onclick="showToast('Fitur Statistik segera hadir!')" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="20" x2="12" y2="10"></line>
                <line x1="18" y1="20" x2="18" y2="4"></line>
                <line x1="6" y1="20" x2="6" y2="16"></line>
            </svg>
            <span class="nav-label">Statistik</span>
        </button>
        <button onclick="showToast('Fitur Profil segera hadir!')" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span class="nav-label">Profil</span>
        </button>
    </nav>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        Message here
    </div>

    <!-- SVG Icons Template (hidden, untuk digunakan di JS) -->
    <svg style="display: none;">
        <defs>
            <!-- Check Icon -->
            <symbol id="icon-check" viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"></polyline>
            </symbol>
            
            <!-- Pray Icon -->
            <symbol id="icon-pray" viewBox="0 0 24 24">
                <path d="M12 2L8 8h8l-4-6z" fill="currentColor"/>
                <rect x="10" y="8" width="4" height="12" fill="currentColor"/>
                <circle cx="12" cy="22" r="1" fill="currentColor"/>
            </symbol>
            
            <!-- Mosque Icon -->
            <symbol id="icon-mosque" viewBox="0 0 24 24">
                <path d="M12 3l-4 4v2h8V7l-4-4z" fill="currentColor"/>
                <rect x="6" y="9" width="12" height="10" fill="currentColor"/>
                <rect x="9" y="13" width="2" height="6" fill="none" stroke="currentColor" stroke-width="1"/>
                <rect x="13" y="13" width="2" height="6" fill="none" stroke="currentColor" stroke-width="1"/>
                <path d="M5 19h14v2H5z" fill="currentColor"/>
                <circle cx="8" cy="7" r="1.5" fill="currentColor"/>
                <circle cx="16" cy="7" r="1.5" fill="currentColor"/>
            </symbol>
            
            <!-- Sun Icon -->
            <symbol id="icon-sun" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2" fill="none"/>
                <line x1="12" y1="1" x2="12" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <line x1="12" y1="21" x2="12" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <line x1="1" y1="12" x2="3" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <line x1="21" y1="12" x2="23" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </symbol>
            
            <!-- Moon Icon -->
            <symbol id="icon-moon" viewBox="0 0 24 24">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </symbol>
        </defs>
    </svg>

    <script src="script.js"></script>
</body>
</html>
