<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sholat Tracker MVP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen pb-20">

    <!-- Header -->
    <header class="p-6 flex justify-between items-center max-w-md mx-auto">
        <div>
            <h1 class="text-2xl font-bold tracking-tight">Ceklis Sholat</h1>
            <p id="current-date" class="text-sm text-slate-500 dark:text-slate-400 font-medium"></p>
        </div>
        <button onclick="toggleDarkMode()" class="w-10 h-10 rounded-full bg-white dark:bg-slate-800 shadow-sm flex items-center justify-center border border-slate-200 dark:border-slate-700">
            <i id="theme-icon" class="fa-solid fa-moon"></i>
        </button>
    </header>

    <main class="max-w-md mx-auto px-6 space-y-6">
        
        <!-- Progress Card -->
        <div class="glass-card rounded-3xl p-6 shadow-xl shadow-blue-500/5 flex items-center gap-6">
            <div class="relative w-24 h-24">
                <svg class="w-24 h-24">
                    <circle class="text-slate-200 dark:text-slate-800" stroke-width="8" stroke="currentColor" fill="transparent" r="40" cx="48" cy="48" />
                    <circle id="progress-bar" class="text-blue-600 progress-ring" stroke-width="8" stroke-dasharray="251.2" stroke-dashoffset="251.2" stroke-linecap="round" stroke="currentColor" fill="transparent" r="40" cx="48" cy="48" />
                </svg>
                <div class="absolute inset-0 flex items-center justify-center flex-col">
                    <span id="percent-text" class="text-xl font-bold leading-none">0%</span>
                </div>
            </div>
            <div>
                <h2 class="font-semibold text-lg">Progres Hari Ini</h2>
                <p id="progress-status" class="text-sm text-slate-500 dark:text-slate-400">Semangat istiqomah!</p>
            </div>
        </div>

        <!-- Prayer List -->
        <div id="prayer-list" class="space-y-4">
            <!-- Items injected via JS -->
        </div>

        <!-- Info / Quote Box -->
        <div class="bg-blue-50 dark:bg-blue-900/20 border border-blue-100 dark:border-blue-800 rounded-2xl p-4">
            <p class="text-xs text-blue-800 dark:text-blue-300 italic text-center">
                "Sesungguhnya sholat itu mencegah dari perbuatan keji dan mungkar." (QS. Al-Ankabut: 45)
            </p>
        </div>

        <!-- Reset Button -->
        <button onclick="resetData()" class="w-full py-3 text-sm text-slate-400 hover:text-red-500 transition-colors">
            Reset Semua Data
        </button>

    </main>

    <!-- Navigation Bar (Simple) -->
    <nav class="fixed bottom-0 left-0 right-0 glass-card border-t border-slate-200 dark:border-slate-800 px-6 py-4 flex justify-around max-w-md mx-auto rounded-t-3xl">
        <button class="text-blue-600 flex flex-col items-center gap-1">
            <i class="fa-solid fa-calendar-check text-xl"></i>
            <span class="text-[10px] font-bold uppercase tracking-widest">Hari Ini</span>
        </button>
        <button onclick="showToast('Fitur Statistik segera hadir!')" class="text-slate-400 flex flex-col items-center gap-1">
            <i class="fa-solid fa-chart-simple text-xl"></i>
            <span class="text-[10px] font-bold uppercase tracking-widest">Statistik</span>
        </button>
        <button onclick="showToast('Fitur Profil segera hadir!')" class="text-slate-400 flex flex-col items-center gap-1">
            <i class="fa-solid fa-user text-xl"></i>
            <span class="text-[10px] font-bold uppercase tracking-widest">Profil</span>
        </button>
    </nav>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-2 rounded-full text-sm opacity-0 transition-opacity pointer-events-none z-50">
        Message here
    </div>

    <script src="script.js"></script>
</body>
</html>
