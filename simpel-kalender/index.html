<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📆 Simpel Kalender Indonesia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            touch-action: manipulation;
        }

        .container {
            max-width: 28rem;
            margin: 0 auto;
            min-height: 100vh;
            background: white;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border-left: 1px solid #f1f5f9;
            border-right: 1px solid #f1f5f9;
            display: flex;
            flex-direction: column;
            padding-bottom: 6rem;
        }

        header {
            padding: 2rem 2rem 1rem;
            text-align: center;
            cursor: pointer;
            position: relative;
        }

        header:hover .copy-hint {
            opacity: 1;
        }

        .current-day-name {
            color: #3b82f6;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }

        .current-date-big {
            font-size: 3rem;
            font-weight: 800;
            color: #0f172a;
            line-height: 1;
        }

        .current-month-year {
            color: #94a3b8;
            font-weight: 500;
            margin-top: 0.25rem;
            font-size: 0.875rem;
        }

        .copy-hint {
            margin-top: 0.75rem;
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: #f8fafc;
            border-radius: 9999px;
            font-size: 0.625rem;
            color: #94a3b8;
            font-weight: 700;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.2s;
        }

        main {
            padding: 0 1.5rem;
            flex-grow: 1;
        }

        .nav-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .nav-btn {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 0.75rem;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:active {
            transform: scale(0.9);
            background: #f1f5f9;
        }

        .nav-btn svg {
            width: 1.25rem;
            height: 1.25rem;
            color: #475569;
        }

        .view-month-year {
            font-weight: 800;
            font-size: 1.25rem;
            color: #0f172a;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .day-header {
            font-weight: 700;
            color: #94a3b8;
            font-size: 0.75rem;
            text-transform: uppercase;
            padding: 0.75rem 0;
            letter-spacing: 0.05em;
            text-align: center;
        }

        .day-header.sunday {
            color: #ef4444;
        }

        .day-cell {
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 0.75rem;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            cursor: default;
        }

        .day-cell.sunday {
            color: #ef4444;
        }

        .today-mark {
            background-color: #3b82f6;
            color: white !important;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .holiday-mark {
            color: #ef4444 !important;
            font-weight: 700;
        }

        .holiday-bg {
            background-color: #fef2f2;
            border: 1px solid #fee2e2;
        }

        .other-month {
            color: #cbd5e1;
            opacity: 0.4;
        }

        .event-dot {
            width: 4px;
            height: 4px;
            background-color: #ef4444;
            border-radius: 50%;
            position: absolute;
            bottom: 6px;
        }

        .holiday-list {
            margin-top: 2rem;
        }

        .holiday-list.hidden {
            display: none;
        }

        .holiday-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }

        .holiday-items {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .holiday-item {
            display: flex;
            align-items: start;
            gap: 0.75rem;
            padding: 0.75rem;
            background: #f8fafc;
            border-radius: 0.75rem;
            border: 1px solid #f1f5f9;
        }

        .holiday-item-day {
            font-weight: 700;
            color: #ef4444;
            min-width: 20px;
            font-size: 0.875rem;
        }

        .holiday-item-name {
            font-size: 0.75rem;
            font-weight: 600;
            color: #475569;
        }

        .today-fab {
            position: fixed;
            right: 1.5rem;
            bottom: 1.5rem;
            background: #0f172a;
            color: white;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            font-weight: 600;
            font-size: 0.875rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            z-index: 50;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .today-fab:active {
            transform: scale(0.95);
        }

        .today-fab svg {
            width: 1rem;
            height: 1rem;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translate(-50%, 20px);
            background: #1e293b;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 100;
        }

        .toast.show {
            opacity: 1;
            transform: translate(-50%, 0);
        }

        .cache-indicator {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: #10b981;
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: 0.5rem;
            font-size: 0.625rem;
            font-weight: 700;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
            pointer-events: none;
        }

        .cache-indicator.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header Hari Ini -->
        <header id="copy-trigger">
            <p id="current-day-name" class="current-day-name">...</p>
            <h1 id="current-date-big" class="current-date-big">...</h1>
            <p id="current-month-year" class="current-month-year">...</p>
            <div class="copy-hint">Tap untuk Salin</div>
        </header>

        <!-- Navigation Kalender -->
        <main>
            <div class="nav-container">
                <button id="prev-month" class="nav-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
                    </svg>
                </button>
                <div class="view-month-year" id="view-month-year">...</div>
                <button id="next-month" class="nav-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" />
                    </svg>
                </button>
            </div>

            <div class="calendar-grid">
                <div class="day-header sunday">Min</div>
                <div class="day-header">Sen</div>
                <div class="day-header">Sel</div>
                <div class="day-header">Rab</div>
                <div class="day-header">Kam</div>
                <div class="day-header">Jum</div>
                <div class="day-header">Sab</div>
            </div>
            <div id="calendar-days" class="calendar-grid">
                <!-- JavaScript Injected -->
            </div>

            <!-- Daftar Hari Libur -->
            <div id="holiday-list" class="holiday-list hidden">
                <h4 class="holiday-title">Hari Penting Bulan Ini</h4>
                <div id="holiday-items" class="holiday-items"></div>
            </div>
        </main>

        <!-- Floating Action Button: Back to Today -->
        <button id="go-to-today" class="today-fab">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd" />
            </svg>
            Hari Ini
        </button>

        <div id="toast" class="toast">Format tanggal disalin!</div>
        <div id="cache-indicator" class="cache-indicator">Cache ✓</div>
    </div>

    <script>
        const state = {
            today: new Date(),
            viewDate: new Date(),
            holidays: []
        };

        const el = {
            dayName: document.getElementById('current-day-name'),
            dateBig: document.getElementById('current-date-big'),
            monthYear: document.getElementById('current-month-year'),
            viewMonthYear: document.getElementById('view-month-year'),
            calendarDays: document.getElementById('calendar-days'),
            holidayList: document.getElementById('holiday-list'),
            holidayItems: document.getElementById('holiday-items'),
            prevBtn: document.getElementById('prev-month'),
            nextBtn: document.getElementById('next-month'),
            goToToday: document.getElementById('go-to-today'),
            copyTrigger: document.getElementById('copy-trigger'),
            toast: document.getElementById('toast'),
            cacheIndicator: document.getElementById('cache-indicator')
        };

        // LocalStorage Cache Manager
        const CACHE_KEY = 'indonesia_holidays_cache';
        const CACHE_EXPIRY = 7 * 24 * 60 * 60 * 1000; // 7 hari

        function getCachedHolidays(year) {
            try {
                const cache = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}');
                const yearCache = cache[year];
                
                if (yearCache && Date.now() - yearCache.timestamp < CACHE_EXPIRY) {
                    showCacheIndicator();
                    return yearCache.data;
                }
                return null;
            } catch (e) {
                return null;
            }
        }

        function setCachedHolidays(year, data) {
            try {
                const cache = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}');
                cache[year] = {
                    data: data,
                    timestamp: Date.now()
                };
                localStorage.setItem(CACHE_KEY, JSON.stringify(cache));
            } catch (e) {
                console.warn('Gagal menyimpan cache:', e);
            }
        }

        function showCacheIndicator() {
            el.cacheIndicator.classList.add('show');
            setTimeout(() => el.cacheIndicator.classList.remove('show'), 1500);
        }

        async function init() {
            renderTodayHeader();
            await fetchHolidays();
            renderCalendar();
            setupEvents();
        }

        function renderTodayHeader() {
            const d = state.today;
            el.dayName.innerText = d.toLocaleDateString('id-ID', { weekday: 'long' });
            el.dateBig.innerText = d.getDate();
            el.monthYear.innerText = d.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
        }

        // Fetch API Hari Libur Indonesia dengan Cache
        async function fetchHolidays() {
            const currentYear = state.viewDate.getFullYear();
            
            // Cek cache dulu
            const cached = getCachedHolidays(currentYear);
            if (cached) {
                state.holidays = cached;
                return;
            }

            // Kalau tidak ada cache, fetch dari API
            try {
                const response = await fetch(`https://api-harilibur.vercel.app/api?year=${currentYear}`);
                if (!response.ok) throw new Error('API error');
                
                const data = await response.json();
                
                // Format data sesuai kebutuhan
                state.holidays = data
                    .filter(item => item.is_national_holiday)
                    .map(item => ({
                        date: item.holiday_date,
                        name: item.holiday_name
                    }));
                
                // Simpan ke cache
                setCachedHolidays(currentYear, state.holidays);
                
            } catch (e) {
                console.warn("Gagal mengambil data libur, menggunakan kalender standar.");
                state.holidays = [];
            }
        }

        function renderCalendar() {
            el.calendarDays.innerHTML = '';
            el.holidayItems.innerHTML = '';
            
            const year = state.viewDate.getFullYear();
            const month = state.viewDate.getMonth();
            
            el.viewMonthYear.innerText = state.viewDate.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const prevMonthLastDay = new Date(year, month, 0).getDate();

            // 1. Padding Bulan Sebelumnya
            for (let i = firstDay; i > 0; i--) {
                const day = prevMonthLastDay - i + 1;
                const dayOfWeek = (7 - i) % 7;
                addDayCell(day, 'other-month', false, dayOfWeek);
            }

            // 2. Bulan Aktif
            let hasHolidaysThisMonth = false;
            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const holiday = state.holidays.find(h => h.date === dateStr);
                
                const isToday = i === state.today.getDate() && 
                                month === state.today.getMonth() && 
                                year === state.today.getFullYear();
                
                const dayOfWeek = (firstDay + i - 1) % 7;
                
                let classes = isToday ? 'today-mark ' : '';
                if (holiday) {
                    classes += 'holiday-mark holiday-bg ';
                    hasHolidaysThisMonth = true;
                    addHolidayItem(i, holiday.name);
                } else if (dayOfWeek === 0 && !isToday) {
                    // Hari Minggu yang bukan hari ini dan bukan libur nasional
                    classes += 'sunday ';
                }
                
                addDayCell(i, classes, !!holiday, dayOfWeek);
            }

            // Tampilkan daftar hari libur jika ada
            el.holidayList.classList.toggle('hidden', !hasHolidaysThisMonth);

            // 3. Padding Bulan Berikutnya
            const totalCells = 42;
            const filled = firstDay + daysInMonth;
            for (let i = 1; i <= (totalCells - filled); i++) {
                const dayOfWeek = (firstDay + daysInMonth + i - 1) % 7;
                addDayCell(i, 'other-month', false, dayOfWeek);
            }
        }

        function addDayCell(day, className, hasEvent, dayOfWeek) {
            const div = document.createElement('div');
            div.className = `day-cell ${className}`;
            div.innerHTML = `<span>${day}</span>`;
            if (hasEvent) {
                const dot = document.createElement('div');
                dot.className = 'event-dot';
                div.appendChild(dot);
            }
            el.calendarDays.appendChild(div);
        }

        function addHolidayItem(day, name) {
            const div = document.createElement('div');
            div.className = "holiday-item";
            div.innerHTML = `
                <span class="holiday-item-day">${day}</span>
                <span class="holiday-item-name">${name}</span>
            `;
            el.holidayItems.appendChild(div);
        }

        function setupEvents() {
            el.prevBtn.onclick = async () => {
                const oldYear = state.viewDate.getFullYear();
                state.viewDate.setMonth(state.viewDate.getMonth() - 1);
                if (state.viewDate.getFullYear() !== oldYear) await fetchHolidays();
                renderCalendar();
            };

            el.nextBtn.onclick = async () => {
                const oldYear = state.viewDate.getFullYear();
                state.viewDate.setMonth(state.viewDate.getMonth() + 1);
                if (state.viewDate.getFullYear() !== oldYear) await fetchHolidays();
                renderCalendar();
            };

            el.goToToday.onclick = async () => {
                const oldYear = state.viewDate.getFullYear();
                state.viewDate = new Date(state.today);
                if (state.viewDate.getFullYear() !== oldYear) await fetchHolidays();
                renderCalendar();
            };

            el.copyTrigger.onclick = () => {
                const text = `${el.dayName.innerText}, ${el.dateBig.innerText} ${el.monthYear.innerText}`;
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                el.toast.classList.add('show');
                setTimeout(() => el.toast.classList.remove('show'), 2000);
            };

            // Swipe
            let startX = 0;
            document.addEventListener('touchstart', e => startX = e.touches[0].clientX);
            document.addEventListener('touchend', e => {
                const diff = startX - e.changedTouches[0].clientX;
                if (Math.abs(diff) > 60) {
                    if (diff > 0) el.nextBtn.click();
                    else el.prevBtn.click();
                }
            });
        }

        init();
    </script>
</body>
</html>
